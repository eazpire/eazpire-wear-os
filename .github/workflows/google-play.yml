name: Google Play (AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: "Play track"
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  upload:
    if: vars.ENABLE_GOOGLE_PLAY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
      - name: Write keystore.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build release AAB
        env:
          CI: "true"
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:bundleRelease --no-daemon
      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.eazpire.wear.os
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || vars.PLAY_DEFAULT_TRACK || 'internal' }}
          status: completed
